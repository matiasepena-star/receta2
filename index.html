<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sistema de Recetas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:14px;color:#1A1A1A;background:#F0F2F0;min-height:100vh}
.app-header{background:#1B4F35;color:#fff;padding:0 20px}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px;height:52px}
.header-logo{font-size:22px}
.app-header h1{font-size:17px;font-weight:600}
.tabs{background:#fff;border-bottom:1px solid #E0E0E0;display:flex;padding:0 20px;overflow-x:auto}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:#666;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:#1B4F35;border-bottom-color:#1B4F35}
.content{max-width:960px;margin:0 auto;padding:20px 16px 48px}
.panel{display:none;flex-direction:column;gap:14px}
.panel.active{display:flex}
.card{background:#fff;border:1px solid #E0E0E0;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#666;margin-bottom:12px}
.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.s1{grid-column:span 1}.field.s2{grid-column:span 2}.field.s3{grid-column:span 3}.field.s4{grid-column:span 4}
label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #E0E0E0;border-radius:8px;font-size:13px;font-family:inherit;color:#1A1A1A;background:#fff}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2D7A50}
textarea{resize:vertical}
.table-wrap{overflow-x:auto;margin-bottom:10px}
.ing-table{width:100%;border-collapse:collapse;font-size:12px}
.ing-table th{background:#1B4F35;color:#fff;padding:8px 10px;text-align:left;font-size:11px;font-weight:600}
.ing-table th.right,.ing-table td.right{text-align:right}
.ing-table th.center,.ing-table td.center{text-align:center}
.ing-table td{padding:7px 8px;border-bottom:1px solid #E0E0E0;vertical-align:middle}
.ing-table tr:nth-child(even) td{background:#E8F5EE}
.ing-table td input,.ing-table td select{padding:5px 7px;font-size:12px;border-radius:5px}
.td-auto{color:#666;font-style:italic}
.td-sub{font-weight:700;color:#1B4F35}
.total-bar{background:#1B4F35;color:#fff;border-radius:12px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.total-label{font-size:12px;opacity:.8;font-weight:500}
.total-val{font-size:22px;font-weight:700}
.pv-block{background:#FEF0E6;border:1px solid #C8500A;border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pv-block label{color:#C8500A;font-size:13px;font-weight:700;text-transform:none;letter-spacing:0;white-space:nowrap}
.pv-block input{max-width:180px;font-size:16px;font-weight:700;color:#C8500A;border-color:#C8500A}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.kpi{background:#fff;border:1px solid #E0E0E0;border-radius:12px;padding:12px 16px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.kpi-label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:700;color:#1B4F35}
.kpi-val.neg{color:#c0392b}
.btn{padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #E0E0E0;background:#fff;color:#1A1A1A}
.btn:hover{background:#F4F4F4}
.btn-green{background:#1B4F35;color:#fff;border-color:#1B4F35}
.btn-green:hover{background:#2D7A50}
.btn-outline{background:#fff;color:#1A1A1A}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:#fdecea;color:#c0392b;border-color:#f5b7b1}
.action-row{display:flex;gap:10px;flex-wrap:wrap}
.search-box{display:flex;gap:10px;align-items:center}
.search-box input{flex:1}
.receta-card{background:#fff;border:1px solid #E0E0E0;border-radius:12px;padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.receta-card:hover{border-color:#2D7A50}
.receta-card .nombre{font-weight:600;font-size:14px}
.receta-card .meta{font-size:12px;color:#666;margin-top:3px}
.receta-card .precio{font-weight:700;color:#1B4F35;font-size:15px;white-space:nowrap}
.badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600}
.badge-green{background:#E8F5EE;color:#1B4F35}
.badge-orange{background:#FEF0E6;color:#C8500A}
.badge-gray{background:#F4F4F4;color:#666}
.insumos-table{width:100%;border-collapse:collapse;font-size:13px}
.insumos-table th{background:#1B4F35;color:#fff;padding:8px 12px;text-align:left;font-size:11px;font-weight:600}
.insumos-table td{padding:8px 12px;border-bottom:1px solid #E0E0E0}
.insumos-table tr:nth-child(even) td{background:#E8F5EE}
.empty{text-align:center;color:#666;font-size:14px;padding:40px 20px;font-style:italic}
.msg{padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;margin-bottom:4px}
.msg-ok{background:#E8F5EE;color:#1B4F35}
.msg-err{background:#fdecea;color:#c0392b}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.detail-header h2{font-size:18px;font-weight:700}
.detail-meta{font-size:12px;color:#666;margin-top:3px}
@media(max-width:640px){
  .form-grid{grid-template-columns:repeat(2,1fr)}
  .field.s3,.field.s4{grid-column:span 2}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi-row .kpi:last-child{grid-column:span 2}
}
</style>
</head>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const fmtM = n => '$' + Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtP = n => Number(n).toFixed(1) + '%';

function showMsg(id, txt, tipo) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = `<div class="msg msg-${tipo}">${txt}</div>`;
  if (tipo === 'ok') setTimeout(() => el.innerHTML = '', 3000);
}

function showTab(t) {
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + t).classList.add('active');
  if (t === 'recetas') renderLista();
  if (t === 'insumos') renderInsumos();
}

// ── Storage ───────────────────────────────────────────────────────────────────
const INSUMOS_DEFAULT = [
  {id:'INS001',nombre:'Harina 000',cat:'Secos',unidad:'kg',costo:85,proveedor:'Molinos Loma'},
  {id:'INS002',nombre:'Harina 0000',cat:'Secos',unidad:'kg',costo:95,proveedor:'Molinos Loma'},
  {id:'INS003',nombre:'Azúcar',cat:'Secos',unidad:'kg',costo:120,proveedor:'Supermercado'},
  {id:'INS004',nombre:'Sal fina',cat:'Secos',unidad:'kg',costo:45,proveedor:'Supermercado'},
  {id:'INS005',nombre:'Aceite de girasol',cat:'Líquidos',unidad:'lt',costo:350,proveedor:'Supermercado'},
  {id:'INS006',nombre:'Aceite de oliva',cat:'Líquidos',unidad:'lt',costo:1800,proveedor:'Almacén'},
  {id:'INS007',nombre:'Leche entera',cat:'Lácteos',unidad:'lt',costo:220,proveedor:'Lácteos Sur'},
  {id:'INS008',nombre:'Crema de leche',cat:'Lácteos',unidad:'lt',costo:680,proveedor:'Lácteos Sur'},
  {id:'INS009',nombre:'Manteca',cat:'Lácteos',unidad:'kg',costo:1200,proveedor:'Lácteos Sur'},
  {id:'INS010',nombre:'Queso mozzarella',cat:'Lácteos',unidad:'kg',costo:1800,proveedor:'Lácteos Sur'},
  {id:'INS011',nombre:'Queso parmesano',cat:'Lácteos',unidad:'kg',costo:2800,proveedor:'Lácteos Sur'},
  {id:'INS012',nombre:'Huevo',cat:'Varios',unidad:'unidad',costo:55,proveedor:'Verdulería'},
  {id:'INS013',nombre:'Merluza entera',cat:'Pescados',unidad:'kg',costo:1400,proveedor:'Puerto'},
  {id:'INS014',nombre:'Merluza fileteada',cat:'Pescados',unidad:'kg',costo:2200,proveedor:'Puerto'},
  {id:'INS015',nombre:'Lenguado',cat:'Pescados',unidad:'kg',costo:4200,proveedor:'Puerto'},
  {id:'INS016',nombre:'Salmón',cat:'Pescados',unidad:'kg',costo:6500,proveedor:'Puerto'},
  {id:'INS017',nombre:'Mejillones',cat:'Mariscos',unidad:'kg',costo:1200,proveedor:'Puerto'},
  {id:'INS018',nombre:'Camarones',cat:'Mariscos',unidad:'kg',costo:3800,proveedor:'Puerto'},
  {id:'INS019',nombre:'Calamar',cat:'Mariscos',unidad:'kg',costo:2200,proveedor:'Puerto'},
  {id:'INS020',nombre:'Tomate',cat:'Verduras',unidad:'kg',costo:380,proveedor:'Verdulería'},
  {id:'INS021',nombre:'Cebolla',cat:'Verduras',unidad:'kg',costo:180,proveedor:'Verdulería'},
  {id:'INS022',nombre:'Ajo',cat:'Verduras',unidad:'kg',costo:950,proveedor:'Verdulería'},
  {id:'INS023',nombre:'Pan rallado',cat:'Secos',unidad:'kg',costo:280,proveedor:'Supermercado'},
  {id:'INS024',nombre:'Orégano',cat:'Condimentos',unidad:'gr',costo:8,proveedor:'Almacén'},
  {id:'INS025',nombre:'Pimienta negra',cat:'Condimentos',unidad:'gr',costo:15,proveedor:'Almacén'},
];

function cargarInsumos() {
  const saved = localStorage.getItem('srec_insumos');
  return saved ? JSON.parse(saved) : INSUMOS_DEFAULT;
}
function guardarInsumosBD(list) { localStorage.setItem('srec_insumos', JSON.stringify(list)); }
function cargarRecetas() {
  const saved = localStorage.getItem('srec_recetas');
  return saved ? JSON.parse(saved) : [];
}
function guardarRecetasBD(list) { localStorage.setItem('srec_recetas', JSON.stringify(list)); }
function nextRecetaId() {
  const n = parseInt(localStorage.getItem('srec_nid') || '1');
  localStorage.setItem('srec_nid', n + 1);
  return n;
}
function nextInsumoId() {
  const n = parseInt(localStorage.getItem('srec_iid') || String(INSUMOS_DEFAULT.length + 1));
  localStorage.setItem('srec_iid', n + 1);
  return 'INS' + String(n).padStart(3, '0');
}

// ── Estado global ─────────────────────────────────────────────────────────────
let insumos = cargarInsumos();
let recetas = cargarRecetas();
let ingRows = [];
let editInsId = null;

function getInsumo(nombre) { return insumos.find(i => i.nombre === nombre); }

// ── Tabla de ingredientes ─────────────────────────────────────────────────────
function addIng() {
  ingRows.push({ nombre: '', cantidad: '' });
  renderIngTable();
}

function renderIngTable() {
  const tbody = document.getElementById('ing-body');
  tbody.innerHTML = '';
  ingRows.forEach((ing, idx) => {
    const ins = getInsumo(ing.nombre);
    const unidad = ins ? ins.unidad : '';
    const cu = ins ? ins.costo : null;
    const sub = (ins && ing.cantidad !== '') ? (parseFloat(ing.cantidad) || 0) * ins.costo : null;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="center" style="color:#aaa">${idx+1}</td>
      <td>
        <select onchange="onIngChange(${idx},this.value)" style="width:100%;min-width:130px">
          <option value="">— elegir —</option>
          ${insumos.map(i => `<option value="${i.nombre}" ${i.nombre===ing.nombre?'selected':''}>${i.nombre}</option>`).join('')}
        </select>
      </td>
      <td class="center td-auto">${unidad}</td>
      <td class="right">
        <input type="number" inputmode="decimal" min="0" step="0.001"
          value="${ing.cantidad}" placeholder="0" style="width:80px;text-align:right"
          onchange="onCantChange(${idx},this.value)"/>
      </td>
      <td class="right td-auto">${cu !== null ? fmtM(cu) : '—'}</td>
      <td class="right td-sub">${sub !== null ? fmtM(sub) : '—'}</td>
      <td><button style="background:none;border:none;color:#c0392b;font-size:18px;cursor:pointer;padding:0 2px" onclick="delIng(${idx})">×</button></td>
    `;
    tbody.appendChild(tr);
  });
  calcKpis();
}

function onIngChange(idx, val) { ingRows[idx].nombre = val; renderIngTable(); }
function onCantChange(idx, val) { ingRows[idx].cantidad = val; calcKpis(); }
function delIng(idx) { ingRows.splice(idx, 1); renderIngTable(); }

function calcTotal() {
  return ingRows.reduce((sum, ing) => {
    const ins = getInsumo(ing.nombre);
    if (ins && ing.cantidad !== '') sum += (parseFloat(ing.cantidad) || 0) * ins.costo;
    return sum;
  }, 0);
}

function calcKpis() {
  const total = calcTotal();
  const pv = parseFloat(document.getElementById('r-pventa').value) || 0;
  const porc = parseInt(document.getElementById('r-porciones').value) || 1;
  document.getElementById('total-costo').textContent = fmtM(total);
  document.getElementById('kpi-cpp').textContent = porc > 0 ? fmtM(total / porc) : '—';
  if (pv > 0) {
    const gan = pv - total;
    const margen = (gan / pv) * 100;
    document.getElementById('kpi-gan').textContent = fmtM(gan);
    document.getElementById('kpi-gan').className = 'kpi-val' + (gan < 0 ? ' neg' : '');
    document.getElementById('kpi-margen').textContent = fmtP(margen);
    document.getElementById('kpi-margen').className = 'kpi-val' + (margen < 0 ? ' neg' : '');
  } else {
    document.getElementById('kpi-gan').textContent = '—';
    document.getElementById('kpi-gan').className = 'kpi-val';
    document.getElementById('kpi-margen').textContent = '—';
    document.getElementById('kpi-margen').className = 'kpi-val';
  }
}

document.getElementById('r-pventa').addEventListener('input', calcKpis);
document.getElementById('r-porciones').addEventListener('input', calcKpis);

// ── Guardar receta ────────────────────────────────────────────────────────────
function guardarReceta() {
  const nombre = document.getElementById('r-nombre').value.trim();
  if (!nombre) { showMsg('msg-nueva', 'Ingresá el nombre de la receta.', 'err'); return; }
  if (!ingRows.some(i => i.nombre)) { showMsg('msg-nueva', 'Agregá al menos un ingrediente.', 'err'); return; }

  const total = calcTotal();
  const pv = parseFloat(document.getElementById('r-pventa').value) || 0;
  const porc = parseInt(document.getElementById('r-porciones').value) || 1;

  const receta = {
    id: nextRecetaId(),
    nombre,
    cat: document.getElementById('r-cat').value,
    porciones: porc,
    desc: document.getElementById('r-desc').value || '',
    costo: total,
    pventa: pv,
    ganancia: pv > 0 ? pv - total : null,
    margen: pv > 0 ? ((pv - total) / pv) * 100 : null,
    ingredientes: ingRows.filter(i => i.nombre).map(i => {
      const ins = getInsumo(i.nombre);
      return {
        nombre: i.nombre,
        cantidad: parseFloat(i.cantidad) || 0,
        unidad: ins ? ins.unidad : '',
        cu: ins ? ins.costo : 0,
        sub: (parseFloat(i.cantidad) || 0) * (ins ? ins.costo : 0),
      };
    }),
    fecha: new Date().toLocaleDateString('es-AR'),
  };

  recetas.unshift(receta);
  guardarRecetasBD(recetas);
  showMsg('msg-nueva', `Receta "${nombre}" guardada correctamente.`, 'ok');
  setTimeout(() => limpiarFormulario(false), 800);
}

function limpiarFormulario(confirmar) {
  if (confirmar && document.getElementById('r-nombre').value.trim()) {
    if (!confirm('¿Limpiar el formulario? Se perderán los datos no guardados.')) return;
  }
  document.getElementById('r-nombre').value = '';
  document.getElementById('r-cat').value = '';
  document.getElementById('r-porciones').value = '4';
  document.getElementById('r-desc').value = '';
  document.getElementById('r-pventa').value = '';
  document.getElementById('msg-nueva').innerHTML = '';
  ingRows = [];
  addIng(); addIng(); addIng();
  document.getElementById('r-nombre').focus();
}

// ── Lista de recetas ──────────────────────────────────────────────────────────
function renderLista() {
  const busq = (document.getElementById('busq-receta').value || '').toLowerCase();
  const lista = document.getElementById('lista-recetas');
  const det = document.getElementById('detalle-receta');
  det.style.display = 'none';
  lista.style.display = 'flex';
  lista.style.flexDirection = 'column';
  lista.style.gap = '10px';

  const filtradas = recetas.filter(r =>
    r.nombre.toLowerCase().includes(busq) || (r.cat || '').toLowerCase().includes(busq)
  );

  if (!filtradas.length) {
    lista.innerHTML = recetas.length === 0
      ? '<p class="empty">Todavía no guardaste ninguna receta.</p>'
      : '<p class="empty">No se encontraron recetas.</p>';
    return;
  }

  lista.innerHTML = filtradas.map(r => `
    <div class="receta-card" onclick="verReceta(${r.id})">
      <div>
        <div class="nombre">${r.nombre}</div>
        <div class="meta">
          ${r.cat ? `<span class="badge badge-gray">${r.cat}</span> · ` : ''}
          ${r.porciones} porciones · ${r.ingredientes.length} ingrediente${r.ingredientes.length !== 1 ? 's' : ''} · ${r.fecha}
        </div>
      </div>
      <div style="text-align:right">
        <div class="precio">${fmtM(r.costo)}</div>
        ${r.margen != null ? `<span class="badge ${r.margen >= 25 ? 'badge-green' : 'badge-orange'}">${r.margen.toFixed(1)}% margen</span>` : ''}
      </div>
    </div>
  `).join('');
}

function verReceta(id) {
  const r = recetas.find(x => x.id === id);
  if (!r) return;
  document.getElementById('lista-recetas').style.display = 'none';
  const det = document.getElementById('detalle-receta');
  det.style.display = 'flex';
  det.style.flexDirection = 'column';
  det.style.gap = '14px';
  det.innerHTML = `
    <button class="btn btn-sm btn-outline" style="align-self:flex-start" onclick="volverLista()">← Volver</button>
    <div class="card">
      <div class="detail-header">
        <div>
          <h2>${r.nombre}</h2>
          <div class="detail-meta">${r.cat ? `<span class="badge badge-gray">${r.cat}</span> · ` : ''}${r.porciones} porciones · ${r.fecha}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" style="background:#C8500A;color:#fff;border-color:#C8500A" onclick="editarReceta(${r.id})">Editar</button>
          <button class="btn btn-sm btn-danger" onclick="eliminarReceta(${r.id})">Eliminar</button>
        </div>
      </div>
      ${r.desc ? `<p style="font-size:13px;color:#666;border-top:1px solid #E0E0E0;padding-top:10px;margin-top:4px;white-space:pre-wrap">${r.desc}</p>` : ''}
    </div>
    <div class="card">
      <p class="sec-title">Ingredientes</p>
      <div class="table-wrap">
        <table class="insumos-table">
          <thead><tr><th>Insumo</th><th style="text-align:right">Cantidad</th><th style="text-align:right">Costo unit.</th><th style="text-align:right">Subtotal</th></tr></thead>
          <tbody>
            ${r.ingredientes.map(i => `
              <tr>
                <td><strong>${i.nombre}</strong></td>
                <td style="text-align:right">${i.cantidad} ${i.unidad}</td>
                <td style="text-align:right;color:#666">${fmtM(i.cu)}</td>
                <td style="text-align:right;font-weight:600">${fmtM(i.sub)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Costo total</div><div class="kpi-val">${fmtM(r.costo)}</div></div>
      <div class="kpi"><div class="kpi-label">Precio de venta</div><div class="kpi-val" style="color:#C8500A">${r.pventa ? fmtM(r.pventa) : '—'}</div></div>
      <div class="kpi"><div class="kpi-label">Margen</div><div class="kpi-val ${r.margen != null && r.margen < 0 ? 'neg' : ''}">${r.margen != null ? fmtP(r.margen) : '—'}</div></div>
    </div>
  `;
}

function volverLista() {
  document.getElementById('lista-recetas').style.display = 'flex';
  document.getElementById('detalle-receta').style.display = 'none';
}

function editarReceta(id) {
  const r = recetas.find(x => x.id === id);
  if (!r) return;
  document.getElementById('r-nombre').value = r.nombre;
  document.getElementById('r-cat').value = r.cat || '';
  document.getElementById('r-porciones').value = r.porciones;
  document.getElementById('r-desc').value = r.desc || '';
  document.getElementById('r-pventa').value = r.pventa || '';
  ingRows = r.ingredientes.map(i => ({ nombre: i.nombre, cantidad: i.cantidad }));
  while (ingRows.length < 3) ingRows.push({ nombre: '', cantidad: '' });
  recetas = recetas.filter(x => x.id !== id);
  guardarRecetasBD(recetas);
  renderIngTable();
  showTab2('nueva');
  showMsg('msg-nueva', `"${r.nombre}" cargada para editar. Al guardar se actualizará.`, 'ok');
}

function eliminarReceta(id) {
  const r = recetas.find(x => x.id === id);
  if (!r || !confirm(`¿Eliminar "${r.nombre}"?`)) return;
  recetas = recetas.filter(x => x.id !== id);
  guardarRecetasBD(recetas);
  volverLista();
  renderLista();
}

function showTab2(t) {
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', ['nueva','recetas','insumos'][i] === t);
  });
  document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
}

// ── Insumos ───────────────────────────────────────────────────────────────────
function renderInsumos() {
  const busq = (document.getElementById('busq-insumo').value || '').toLowerCase();
  const lista = document.getElementById('lista-insumos');
  const filtrados = insumos.filter(i =>
    i.nombre.toLowerCase().includes(busq) ||
    i.cat.toLowerCase().includes(busq) ||
    (i.proveedor || '').toLowerCase().includes(busq)
  );
  if (!filtrados.length) { lista.innerHTML = '<p class="empty">No se encontraron insumos.</p>'; return; }
  lista.innerHTML = `
    <div class="table-wrap">
      <table class="insumos-table">
        <thead><tr><th>Nombre</th><th>Categoría</th><th>Unidad</th><th style="text-align:right">Costo ($)</th><th>Proveedor</th><th></th></tr></thead>
        <tbody>
          ${filtrados.map(ins => `
            <tr>
              <td><strong>${ins.nombre}</strong></td>
              <td><span class="badge badge-gray">${ins.cat}</span></td>
              <td style="text-align:center">${ins.unidad}</td>
              <td style="text-align:right;font-weight:600;color:#1B4F35">${fmtM(ins.costo)}</td>
              <td style="color:#666">${ins.proveedor || ''}</td>
              <td><button class="btn btn-sm btn-outline" onclick="mostrarFormInsumo('${ins.id}')">Editar</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function mostrarFormInsumo(id) {
  editInsId = id;
  const ins = id ? insumos.find(i => i.id === id) : null;
  document.getElementById('form-ins-title').textContent = ins ? `Editar — ${ins.nombre}` : 'Nuevo insumo';
  document.getElementById('ins-nombre').value    = ins ? ins.nombre    : '';
  document.getElementById('ins-cat').value       = ins ? ins.cat       : 'Secos';
  document.getElementById('ins-unidad').value    = ins ? ins.unidad    : 'kg';
  document.getElementById('ins-costo').value     = ins ? ins.costo     : '';
  document.getElementById('ins-proveedor').value = ins ? ins.proveedor : '';
  document.getElementById('form-insumo').style.display = 'block';
  document.getElementById('ins-nombre').focus();
}

function cancelarInsumo() {
  document.getElementById('form-insumo').style.display = 'none';
  editInsId = null;
}

function guardarInsumo() {
  const nombre    = document.getElementById('ins-nombre').value.trim();
  const costo     = parseFloat(document.getElementById('ins-costo').value);
  const cat       = document.getElementById('ins-cat').value;
  const unidad    = document.getElementById('ins-unidad').value;
  const proveedor = document.getElementById('ins-proveedor').value.trim();
  if (!nombre)               { alert('Ingresá el nombre del insumo.'); return; }
  if (isNaN(costo) || costo <= 0) { alert('Ingresá un costo válido.'); return; }
  if (editInsId) {
    const ins = insumos.find(i => i.id === editInsId);
    if (ins) Object.assign(ins, { nombre, cat, unidad, costo, proveedor });
  } else {
    insumos.push({ id: nextInsumoId(), nombre, cat, unidad, costo, proveedor });
  }
  guardarInsumosBD(insumos);
  cancelarInsumo();
  renderInsumos();
  renderIngTable();
}

// ── Init ──────────────────────────────────────────────────────────────────────
addIng(); addIng(); addIng();
</script>

</body>
</html>
